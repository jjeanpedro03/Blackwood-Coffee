        <section class="container-reserva">
            <h2>Faça sua reserva</h2>
            <form action="https://formspree.io/f/mzzayney" method="POST" id="formReserva">
                <div class="form-grupo">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="form-grupo">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-grupo">
                    <label for="data">Data:</label>
                    <input type="date" id="data" name="data" required>
                </div>
                <div class="form-grupo">
                    <label for="hora">Horário:</label>
                    <input type="time" id="hora" name="hora" required>
                </div>
                <div class="form-grupo">
                    <label for="pessoas">Número de Pessoas:</label>
                    <input type="number" id="pessoas" name="pessoas" min="1" required>
                </div>
                <div class="form-grupo">
                    <label for="observacoes">Observações (opcional):</label>
                    <textarea id="observacoes" name="observacoes" rows="2"></textarea>
                </div>
                <button type="submit">Reservar Agora</button>
            </form>
        </section>
